<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>فروشگاه آنلاین مکمل و استروئید</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #121220;
  --bg-card: rgba(22, 22, 38, 0.8);
  --accent: #ff6b35;
  --accent-secondary: #ff3366;
  --accent-glow: rgba(255, 107, 53, 0.25);
  --accent-glow-strong: rgba(255, 107, 53, 0.5);
  --text-primary: #ffffff;
  --text-secondary: #a2a2c2;
  --text-muted: #626280;
  --danger: #ff4757;
  --success: #2ed573;
  --border: rgba(255, 255, 255, 0.08);
  --border-active: rgba(255, 107, 53, 0.4);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;padding-bottom:90px}

/* Header & Search */
.header{background:rgba(18,18,32,0.85);padding:14px 16px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);backdrop-filter:blur(16px)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 20px var(--accent-glow)}
.header-title{font-size:18px;font-weight:900;background:linear-gradient(135deg,#fff,var(--text-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-subtitle{font-size:11px;color:var(--accent);font-weight:700}

.search-wrap{position:relative}
.search-input{width:100%;padding:12px 42px 12px 16px;border:1px solid var(--border);border-radius:14px;background:var(--bg-primary);color:var(--text-primary);font-family:inherit;font-size:13px;transition:all .3s}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 15px var(--accent-glow)}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;opacity:.6}

/* Hero Section */
.hero{margin:16px;padding:20px;background:linear-gradient(135deg,rgba(255,107,53,0.12) 0%,rgba(255,51,102,0.05) 100%);border:1px solid var(--border-active);border-radius:20px;position:relative;overflow:hidden}
.hero-title{font-size:19px;font-weight:900;margin-bottom:6px}
.hero-title span{color:var(--accent)}
.hero-desc{font-size:12px;color:var(--text-secondary);line-height:1.6}

/* Categories Bar */
.categories{display:flex;gap:8px;padding:0 16px;margin:16px 0;overflow-x:auto;scrollbar-width:none}
.categories::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:8px 16px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:all .25s}
.cat-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:#fff;border-color:transparent;box-shadow:0 4px 15px var(--accent-glow)}

/* Grid & Cards */
.products-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px}
.product-card{background:var(--bg-card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all .25s;display:flex;flex-direction:column;justify-content:space-between;position:relative;backdrop-filter:blur(10px)}
.product-card:active{transform:scale(0.98)}
.product-badge{position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:8px;font-size:10px;font-weight:800;z-index:2}
.badge-new{background:var(--accent);color:#fff}
.badge-sale{background:var(--danger);color:#fff}
.badge-popular{background:#ffb703;color:#000}

.product-img-wrap{width:100%;height:130px;background:rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center;padding:10px;position:relative}
.product-img{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));transition:transform .3s}
.product-card:hover .product-img{transform:scale(1.05)}
.product-icon{font-size:52px}

.product-info{padding:12px;display:flex;flex-direction:column;flex-grow:1}
.product-brand{font-size:10px;color:var(--accent);font-weight:800;text-transform:uppercase;margin-bottom:2px}
.product-name{font-size:12px;font-weight:700;color:var(--text-primary);line-height:1.4;margin-bottom:6px;height:34px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.product-weight{font-size:11px;color:var(--text-muted);margin-bottom:10px}
.product-footer{display:flex;justify-content:space-between;align-items:center;margin-top:auto}
.product-price{font-size:13px;font-weight:900;color:#fff}
.add-btn{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));border:none;color:#fff;font-size:18px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px var(--accent-glow)}

/* Floating Bottom Cart Bar */
.floating-cart-bar{position:fixed;bottom:16px;left:16px;right:16px;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));border-radius:16px;padding:12px 20px;display:none;justify-content:space-between;align-items:center;box-shadow:0 10px 30px var(--accent-glow-strong);z-index:99;cursor:pointer;animation:slideUp .3s ease}
.floating-cart-bar.active{display:flex}
.floating-info{display:flex;align-items:center;gap:12px}
.floating-badge{background:#fff;color:#000;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px}
.floating-price{font-weight:900;font-size:15px}

/* Modal UI */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
.modal-overlay.active{display:flex}
.modal{background:var(--bg-secondary);width:100%;max-height:85vh;border-radius:24px 24px 0 0;padding:20px;overflow-y:auto;border-top:1px solid var(--border);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:50px;height:50px;background:rgba(255,255,255,0.05);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden}
.cart-item-img img{width:100%;height:100%;object-fit:contain}
.qty-controls{display:flex;align-items:center;gap:8px;background:var(--bg-primary);padding:4px 8px;border-radius:10px;border:1px solid var(--border)}
.qty-btn{width:24px;height:24px;border:none;background:var(--bg-card);color:#fff;border-radius:6px;cursor:pointer;font-weight:bold}

/* Inputs & Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600}
.form-input,.form-textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:var(--bg-primary);color:#fff;font-family:inherit;font-size:13px}
.form-input:focus,.form-textarea:focus{outline:none;border-color:var(--accent)}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent-secondary));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:10px;box-shadow:0 4px 20px var(--accent-glow)}

.view{display:none}
.view.active{display:block}
</style>
</head>
<body>

<!-- Products Main View -->
<div id="productsView" class="view active">
  <div class="header">
    <div class="header-top">
      <div class="header-brand">
        <div class="header-logo">⚡</div>
        <div>
          <div class="header-title">فروشگاه تخصصی</div>
          <div class="header-subtitle">مکمل‌های اورجینال و استروئید</div>
        </div>
      </div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="جستجوی محصول یا برند..." oninput="handleSearch(this.value)">
    </div>
  </div>

  <div class="hero">
    <div class="hero-title">تضمین <span>اصالت و کیفیت</span> 🏆</div>
    <div class="hero-desc">ارسال سریع به سراسر کشور | مشاوره و پشتیبانی مستقیم</div>
  </div>

  <div class="categories" id="categories">
    <button class="cat-btn active" data-cat="all" onclick="filterCategory('all')">همه</button>
    <button class="cat-btn" data-cat="gainer" onclick="filterCategory('gainer')">گینر</button>
    <button class="cat-btn" data-cat="protein" onclick="filterCategory('protein')">پروتئین</button>
    <button class="cat-btn" data-cat="creatine" onclick="filterCategory('creatine')">کراتین</button>
    <button class="cat-btn" data-cat="bcaa" onclick="filterCategory('bcaa')">بی سی ای ای</button>
    <button class="cat-btn" data-cat="glutamine" onclick="filterCategory('glutamine')">گلوتامین</button>
    <button class="cat-btn" data-cat="amino" onclick="filterCategory('amino')">آمینو</button>
    <button class="cat-btn" data-cat="fatburner" onclick="filterCategory('fatburner')">چربی سوز</button>
    <button class="cat-btn" data-cat="preworkout" onclick="filterCategory('preworkout')">پمپ</button>
    <button class="cat-btn" data-cat="testbooster" onclick="filterCategory('testbooster')">تست بوستر</button>
    <button class="cat-btn" data-cat="vitamin" onclick="filterCategory('vitamin')">ویتامین</button>
    <button class="cat-btn" data-cat="other" onclick="filterCategory('other')">متفرقه</button>
  </div>

  <div class="products-grid" id="productsGrid"></div>
</div>

<!-- Floating Cart Bar -->
<div class="floating-cart-bar" id="floatingCartBar" onclick="openCart()">
  <div class="floating-info">
    <div class="floating-badge" id="cartBadge">0</div>
    <div>
      <div style="font-size:11px;opacity:.8">سبد خرید شما</div>
      <div class="floating-price" id="floatingTotalPrice">0 تومان</div>
    </div>
  </div>
  <div style="font-weight:900;font-size:13px">مشاهده سبد ←</div>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)">
      <div style="font-size:16px;font-weight:800">🛒 سبد خرید شما</div>
      <button onclick="closeCart()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer">✕</button>
    </div>
    <div id="cartItems"></div>
    <div id="cartFooter" style="margin-top:16px;display:none">
      <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:900;margin-bottom:14px">
        <span>مبلغ قابل پرداخت:</span>
        <span id="modalTotalPrice" style="color:var(--accent)">0 تومان</span>
      </div>
      <button class="submit-btn" onclick="goToCheckout()">ادامه و ثبت سفارش →</button>
    </div>
  </div>
</div>

<!-- Checkout View -->
<div id="checkoutView" class="view">
  <div class="header">
    <div class="header-title">تکمیل فرم سفارش</div>
  </div>
  <div style="padding:16px">
    <button onclick="backToProducts()" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text-secondary);padding:8px 14px;border-radius:10px;font-family:inherit;font-size:12px;margin-bottom:16px">← بازگشت به فروشگاه</button>
    <div class="form-group">
      <label class="form-label">نام و نام خانوادگی *</label>
      <input type="text" class="form-input" id="customerName" placeholder="مثال: علی محمدی">
    </div>
    <div class="form-group">
      <label class="form-label">شماره همراه *</label>
      <input type="tel" class="form-input" id="customerPhone" placeholder="09123456789">
    </div>
    <div class="form-group">
      <label class="form-label">آدرس کامل پستی *</label>
      <textarea class="form-textarea" id="customerAddress" rows="3" placeholder="استان، شهر، خیابان..."></textarea>
    </div>
    <button class="submit-btn" onclick="submitOrder()">✅ ارسال و تایید نهایی سفارش</button>
  </div>
</div>

<script>
let products = [];
let cart = {};
let currentCategory = 'all';
let currentSearch = '';

function formatPrice(price) {
  return price.toLocaleString('fa-IR') + ' تومان';
}

function loadProducts() {
  fetch('products.json')
    .then(r => r.json())
    .then(data => {
      products = data;
      renderProducts();
    })
    .catch(err => console.error("Error loading products:", err));
}

function getProductImageHTML(p) {
  if (p.image && p.image.trim() !== "") {
    return `<img src="${p.image}" class="product-img" alt="${p.name}" onerror="this.onerror=null; this.parentNode.innerHTML='<div class=\'product-icon\'>${p.icon || '💊'}</div>';">`;
  }
  return `<div class="product-icon">${p.icon || '🏋️'}</div>`;
}

function renderProducts() {
  let filtered = products;
  if (currentCategory !== 'all') {
    filtered = filtered.filter(p => p.category === currentCategory);
  }
  if (currentSearch.trim()) {
    const q = currentSearch.trim().toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.brand && p.brand.toLowerCase().includes(q)));
  }

  const grid = document.getElementById('productsGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)">محصولی یافت نشد.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(p => {
    let badgeHTML = '';
    if (p.badge === 'new') badgeHTML = '<span class="product-badge badge-new">جدید</span>';
    else if (p.badge === 'sale') badgeHTML = '<span class="product-badge badge-sale">تخفیف</span>';
    else if (p.badge === 'popular') badgeHTML = '<span class="product-badge badge-popular">پرفروش</span>';

    return `
      <div class="product-card" onclick="addToCart(${p.id})">
        ${badgeHTML}
        <div class="product-img-wrap">
          ${getProductImageHTML(p)}
        </div>
        <div class="product-info">
          <div class="product-brand">${p.brand || ''}</div>
          <div class="product-name">${p.name}</div>
          <div class="product-weight">${p.weight || ''}</div>
          <div class="product-footer">
            <span class="product-price">${formatPrice(p.price)}</span>
            <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function handleSearch(val) { currentSearch = val; renderProducts(); }
function filterCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.cat === cat));
  renderProducts();
}

function addToCart(id) {
  if (cart[id]) { cart[id].qty++; } 
  else {
    const p = products.find(x => x.id === id);
    if(p) cart[id] = { ...p, qty: 1 };
  }
  updateCartUI();
}

function updateQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartUI();
}

function updateCartUI() {
  const items = Object.values(cart);
  const totalCount = items.reduce((s, i) => s + i.qty, 0);
  const totalPrice = items.reduce((s, i) => s + (i.price * i.qty), 0);

  const bar = document.getElementById('floatingCartBar');
  if (totalCount > 0) {
    bar.classList.add('active');
    document.getElementById('cartBadge').textContent = totalCount;
    document.getElementById('floatingTotalPrice').textContent = formatPrice(totalPrice);
  } else {
    bar.classList.remove('active');
    closeCart();
  }

  const itemsDiv = document.getElementById('cartItems');
  const footer = document.getElementById('cartFooter');
  if (items.length === 0) {
    itemsDiv.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-muted)">سبد خرید خالی است.</div>`;
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'block';
  document.getElementById('modalTotalPrice').textContent = formatPrice(totalPrice);

  itemsDiv.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="cart-item-img">
        ${item.image ? `<img src="${item.image}">` : item.icon || '📦'}
      </div>
      <div style="flex:1">
        <div style="font-size:12px;font-weight:700">${item.name}</div>
        <div style="font-size:11px;color:var(--accent);margin-top:2px">${formatPrice(item.price)}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
        <span style="font-size:13px;font-weight:bold">${item.qty}</span>
        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
      </div>
    </div>
  `).join('');
}

function openCart() { document.getElementById('cartModal').classList.add('active'); }
function closeCart() { document.getElementById('cartModal').classList.remove('active'); }

function goToCheckout() {
  closeCart();
  document.getElementById('productsView').classList.remove('active');
  document.getElementById('checkoutView').classList.add('active');
  window.scrollTo(0,0);
}

function backToProducts() {
  document.getElementById('checkoutView').classList.remove('active');
  document.getElementById('productsView').classList.add('active');
}

function submitOrder() {
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const address = document.getElementById('customerAddress').value.trim();

  if (!name || !phone || !address) {
    alert('لطفاً فرم را کاملاً پر کنید.');
    return;
  }

  const items = Object.values(cart);
  const total = items.reduce((s, i) => s + (i.price * i.qty), 0);
  const orderData = {
    customer: { name, phone, address },
    items: items.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
    total: total
  };

  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.sendData(JSON.stringify(orderData));
    window.Telegram.WebApp.close();
  } else {
    alert('سفارش با موفقیت ثبت شد!');
  }
}

function initTelegram() {
  if (window.Telegram && window.Telegram.WebApp) {
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();
    tg.setHeaderColor('#0a0a12');
    tg.setBackgroundColor('#0a0a12');
  }
}

loadProducts();
initTelegram();
</script>
</body>
  </html>
